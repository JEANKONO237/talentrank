name: Sync fork → Vercel

# Auto-sync le fork jeankono0707-cyber/talentrank-v2 à chaque push sur main.
# Vercel suit ce fork ; sans ce workflow il faudrait cliquer "Sync fork" sur
# GitHub à chaque push pour déclencher un nouveau déploiement.
#
# Secret requis : FORK_PAT
#   Personal Access Token (classic) créé depuis le compte jeankono0707-cyber
#   avec scope `repo`. Settings → Secrets and variables → Actions.

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: sync-fork
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout upstream
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # IMPORTANT : persist-credentials: false sinon GitHub Actions
          # configure un credential helper qui force github-actions[bot]
          # à la place de notre PAT lors du git push vers le fork.
          persist-credentials: false

      - name: Push to fork via PAT
        env:
          PAT: ${{ secrets.FORK_PAT }}
        run: |
          set -e

          # Vérification que le secret est bien présent
          if [ -z "$PAT" ]; then
            echo "::error::Le secret FORK_PAT est vide ou manquant."
            echo "→ Va sur Settings → Secrets → Actions → New repository secret"
            echo "→ Name: FORK_PAT, Value: ton Personal Access Token (jeankono0707-cyber, scope 'repo')"
            exit 1
          fi
          echo "✓ PAT secret présent (${#PAT} caractères)"

          # Identité git basique
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

          # On supprime toute config credential persistante héritée
          git config --unset-all http.https://github.com/.extraheader || true

          # Push vers le fork — convention GitHub : `x-access-token:<PAT>`
          # comme couple user:password. Cette syntaxe fonctionne pour
          # classique tokens ET fine-grained tokens.
          FORK_URL="https://x-access-token:${PAT}@github.com/jeankono0707-cyber/talentrank-v2.git"

          echo "→ Push vers le fork (force, branche main)…"
          git push --force "$FORK_URL" HEAD:main

          echo "✓ Fork synchronisé — Vercel devrait rebuild automatiquement."
